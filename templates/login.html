<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecOps Gateway | Auth Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen font-sans antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <div class="w-full max-w-md p-8 bg-slate-900/60 backdrop-blur-md rounded-2xl border border-slate-800 shadow-2xl">
        <div class="flex flex-col items-center mb-8">
            <div class="p-3 bg-indigo-500/10 rounded-xl border border-indigo-500/30 mb-3 text-indigo-400">
                <i data-lucide="shield-alert" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">SIEM Portal Login</h1>
            <p class="text-sm text-slate-400 mt-1">Authorized access points only</p>
        </div>

        {% if message %}
        <div class="mb-6 p-4 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm flex items-center gap-3">
            <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
            <span>{{ message }}</span>
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <input type="text" id="username" name="username" required
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-950/80 border border-slate-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-slate-200 placeholder-slate-600 transition" 
                        placeholder="admin">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input type="password" id="password" name="password" required
                        class="block w-full pl-10 pr-4 py-2.5 bg-slate-950/80 border border-slate-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-slate-200 placeholder-slate-600 transition" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium rounded-lg shadow-lg shadow-indigo-600/20 transition-all duration-150 flex items-center justify-center gap-2">
                <i data-lucide="key-round" class="w-4 h-4"></i>
                Verify Credentials
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-800/80 flex justify-center gap-4">
            <a href="/" class="text-xs text-slate-400 hover:text-white flex items-center gap-1.5 transition">
                <i data-lucide="home" class="w-3.5 h-3.5"></i> Home
            </a>
            <span class="text-slate-700">|</span>
            <a href="/dashboard" class="text-xs text-indigo-400 hover:text-indigo-300 flex items-center gap-1.5 transition">
                <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> Incident Dashboard
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
